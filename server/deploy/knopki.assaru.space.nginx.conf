# knopki.assaru.space — бэкенд ИИ-диктовки (голос → JSON кнопок / размеченный
# текст) для telegram-keyboard-constructor. Только reverse-proxy на Node
# (server/index.js, PM2: knopki-ai-api, порт 127.0.0.1:8788). Статику не отдаёт —
# фронтенд живёт на GitHub Pages (roman72-186.github.io/color_butten/).
#
# Установка (server-main, 72.56.77.253):
#   1. DNS: A-запись knopki.assaru.space -> 72.56.77.253 (сделать заранее, certbot
#      не выпустит сертификат, пока домен не резолвится на этот сервер)
#   2. скопировать этот файл в /etc/nginx/sites-available/knopki.assaru.space
#   3. ln -s ../sites-available/knopki.assaru.space /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#   5. certbot --nginx -d knopki.assaru.space   # сам допишет server{listen 443}+редирект
#
# Блок 443/ssl_certificate certbot допишет сам — не добавлять заранее руками,
# иначе nginx -t упадёт, пока сертификат ещё не выпущен (см. api.assaru.space.conf).

server {
    server_name knopki.assaru.space;

    location /api/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 8m;
    }

    location / {
        return 404;
    }

    listen 80;
    listen [::]:80;
}
